<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>KinalApp - Nueva Venta</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<button class="menu-toggle">☰</button>

<div th:replace="~{layout/nav :: menu}"></div>

<main class="main-content">
    <div class="container-small">
        <div class="card">
            <header class="card-header">
                <h1>Registrar Nueva Venta</h1>
            </header>

            <form th:action="@{/ventas/guardar}" th:object="${venta}" method="post" class="form-standard">
                <!-- Cliente: enviar solo el DPI -->
                <div class="form-group">
                    <label for="clienteDpi">Cliente</label>
                    <select id="clienteDpi" name="clienteDpi" class="form-control" required>
                        <option value="">Seleccione un cliente</option>
                        <option th:each="cliente : ${clientes}"
                                th:value="${cliente.DPICliente}"
                                th:text="${cliente.nombreCliente} + ' ' + ${cliente.apellidoCliente} + ' - ' + ${cliente.DPICliente}">
                        </option>
                    </select>
                </div>

                <!-- Usuario: enviar solo el código -->
                <div class="form-group">
                    <label for="usuarioCodigo">Vendedor</label>
                    <select id="usuarioCodigo" name="usuarioCodigo" class="form-control" required>
                        <option value="">Seleccione un vendedor</option>
                        <option th:each="usuario : ${usuarios}"
                                th:value="${usuario.codigoUsuario}"
                                th:text="${usuario.username} + ' - ' + ${usuario.codigoUsuario}">
                        </option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="total">Total de la Venta (Q)</label>
                    <input type="number" id="total" name="total" th:value="*{total}"
                           class="form-control" step="0.01" min="0" required>
                </div>

                <div class="form-group">
                    <label for="estado">Estado</label>
                    <select id="estado" name="estado" class="form-control">
                        <option value="1">Activa</option>
                        <option value="0">Anulada</option>
                    </select>
                </div>

                <div class="form-actions">
                    <a th:href="@{/ventas}" class="btn btn-secondary">Cancelar</a>
                    <button type="submit" class="btn btn-save">Guardar Venta</button>
                </div>
            </form>
        </div>
    </div>
</main>

<script>
    const menuToggle = document.querySelector('.menu-toggle');
    const sidebar = document.querySelector('.sidebar');
    if (menuToggle && sidebar) {
        menuToggle.addEventListener('click', function() {
            sidebar.classList.toggle('open');
        });
    }
</script>

</body>
</html>
