<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>KinalApp - Lista de Ventas</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{layout/nav :: menu}"></div>

<main class="main-content">
    <div class="container">
        <header class="content-header">
            <h1>Gestión de Ventas</h1>
            <a th:href="@{/ventas/nueva}" class="btn btn-primary">
                <span>+</span> Nueva Venta
            </a>
        </header>

        <section class="table-responsive">
            <table>
                <thead>
                <tr>
                    <th>Código Venta</th>
                    <th>Fecha</th>
                    <th>Cliente</th>
                    <th>Usuario</th>
                    <th>Total</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="venta : ${ventas}">
                    <td th:text="${venta.codigoVenta}">1</td>
                    <td th:text="${#dates.format(venta.fechaVenta, 'dd/MM/yyyy')}">01/01/2026</td>
                    <td th:text="${venta.cliente.nombreCliente} + ' ' + ${venta.cliente.apellidoCliente}">Cliente</td>
                    <td th:text="${venta.usuario.username}">vendedor</td>
                    <td th:text="'Q' + ${venta.total}">Q100.00</td>
                    <td>
                        <span th:if="${venta.estado == 1}" class="badge active">Activa</span>
                        <span th:if="${venta.estado == 0}" class="badge inactive">Anulada</span>
                    </td>
                    <td class="actions">
                        <a th:href="@{/ventas/detalle/{id}(id=${venta.codigoVenta})}" class="btn-view">👁️</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </section>
    </div>
</main>

</body>
</html>
