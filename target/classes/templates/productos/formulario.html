<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>KinalApp - Formulario de Producto</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{layout/nav :: menu}"></div>

<main class="main-content">
    <div class="container-small">
        <div class="card">
            <header class="card-header">
                <h1 th:text="${producto.codigoProducto != null} ? 'Editar Producto' : 'Nuevo Producto'">Formulario Producto</h1>
            </header>

            <form th:action="@{/productos/guardar}" th:object="${producto}" method="post" class="form-standard">

                <div class="form-group">
                    <label for="codigoProducto">Código del Producto</label>
                    <input type="text" id="codigoProducto" th:field="*{codigoProducto}"
                           class="form-control" placeholder="Ej: PROD-001"
                           th:readonly="${producto.codigoProducto != null}" required>
                </div>

                <div class="form-group">
                    <label for="nombreProducto">Nombre del Producto</label>
                    <input type="text" id="nombreProducto" th:field="*{nombreProducto}"
                           class="form-control" placeholder="Ingrese nombre" required>
                </div>

                <div class="form-group">
                    <label for="precio">Precio (Q)</label>
                    <input type="text" id="precio" th:field="*{precio}"
                           class="form-control" placeholder="0.00" required>
                    <small>Formato decimal (ej: 15.50)</small>
                </div>

                <div class="form-group">
                    <label for="stock">Stock Inicial</label>
                    <input type="number" id="stock" th:field="*{stock}"
                           class="form-control" min="0" required>
                </div>

                <div class="form-group">
                    <label for="estado">Estado del Producto</label>
                    <select id="estado" th:field="*{estado}" class="form-control">
                        <option value="1">Activo</option>
                        <option value="0">Inactivo</option>
                    </select>
                </div>

                <div class="form-actions">
                    <a th:href="@{/productos}" class="btn btn-secondary">Cancelar</a>
                    <button type="submit" class="btn btn-save">Guardar Cambios</button>
                </div>
            </form>
        </div>
    </div>
</main>

</body>
</html>
