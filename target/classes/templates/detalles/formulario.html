<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KinalApp - Nuevo Detalle de Venta</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<button class="menu-toggle">☰</button>

<div th:replace="~{layout/nav :: menu}"></div>

<main class="main-content">
    <div class="container-small">
        <div class="card">
            <div class="card-header">
                <h1>➕ Agregar Producto a Venta</h1>
            </div>

            <form th:action="@{/detalles/guardar}" method="post" class="form-standard">
                <!-- Venta: enviar solo el código -->
                <div class="form-group">
                    <label for="codigoVenta">Venta</label>
                    <select id="codigoVenta" name="codigoVenta" class="form-control" required>
                        <option value="">Seleccione una venta</option>
                        <option th:each="venta : ${ventas}"
                                th:value="${venta.codigoVenta}"
                                th:text="'Venta #' + ${venta.codigoVenta} + ' - Cliente: ' + ${venta.cliente.nombreCliente} + ' - Total: Q' + ${venta.total}">
                        </option>
                    </select>
                </div>

                <!-- Producto: enviar solo el código -->
                <div class="form-group">
                    <label for="codigoProducto">Producto</label>
                    <select id="codigoProducto" name="codigoProducto" class="form-control" required>
                        <option value="">Seleccione un producto</option>
                        <option th:each="producto : ${productos}"
                                th:value="${producto.codigoProducto}"
                                th:text="${producto.nombreProducto} + ' - Stock: ' + ${producto.stock} + ' - Precio: Q' + ${producto.precio}">
                        </option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="cantidad">Cantidad</label>
                    <input type="number" id="cantidad" name="cantidad"
                           class="form-control" min="1" required>
                </div>

                <div class="form-actions">
                    <a th:href="@{/detalles}" class="btn btn-secondary">Cancelar</a>
                    <button type="submit" class="btn btn-save">Guardar Detalle</button>
                </div>
            </form>
        </div>
    </div>
</main>

<script>
    const menuToggle = document.querySelector('.menu-toggle');
    const sidebar = document.querySelector('.sidebar');
    if (menuToggle && sidebar) {
        menuToggle.addEventListener('click', function() {
            sidebar.classList.toggle('open');
        });
    }
</script>

</body>
</html>
