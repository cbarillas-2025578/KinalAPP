<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulario Cliente</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{layout/nav :: menu}"></div>
<div class="main-content">
    <div class="card" style="max-width: 500px; margin: auto;">
        <h1>Datos del Cliente</h1>
        <form th:action="@{/clientes/guardar}" th:object="${cliente}" method="post">
            <div class="form-group">
                <label>DPI:</label>
                <input type="text" th:field="*{DPICliente}" required>
            </div>
            <div class="form-group">
                <label>Nombre:</label>
                <input type="text" th:field="*{nombreCliente}" required>
            </div>
            <div class="form-group">
                <label>Apellido:</label>
                <input type="text" th:field="*{apellidoCliente}" required>
            </div>
            <div class="form-group">
                <label>Estado:</label>
                <select th:field="*{estado}">
                    <option value="1">Activo</option>
                    <option value="0">Inactivo</option>
                </select>
            </div>
            <button type="submit" class="btn btn-save">Guardar Cliente</button>
        </form>
    </div>
</div>
</body>
</html>
