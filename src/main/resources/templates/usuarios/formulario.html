<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>KinalApp - Formulario de Usuario</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{layout/nav :: menu}"></div>

<main class="main-content">
    <div class="container-small">
        <div class="card">
            <header class="card-header">
                <h1>Nuevo Usuario</h1>
            </header>

            <form th:action="@{/usuarios/guardar}" th:object="${usuario}" method="post" class="form-standard">
                <div class="form-group">
                    <label for="codigoUsuario">Código de Usuario</label>
                    <input type="text" id="codigoUsuario" th:field="*{codigoUsuario}"
                           class="form-control" placeholder="Ej: USR-001" required>
                </div>

                <div class="form-group">
                    <label for="username">Nombre de Usuario</label>
                    <input type="text" id="username" th:field="*{username}"
                           class="form-control" placeholder="Ingrese username" required>
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" th:field="*{password}"
                           class="form-control" placeholder="Ingrese contraseña" required>
                </div>

                <div class="form-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" th:field="*{email}"
                           class="form-control" placeholder="usuario@mail.com" required>
                </div>

                <div class="form-group">
                    <label for="rol">Rol</label>
                    <select id="rol" th:field="*{rol}" class="form-control">
                        <option value="ADMIN">Administrador</option>
                        <option value="VENDEDOR">Vendedor</option>
                        <option value="INVENTARIO">Inventario</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="estado">Estado</label>
                    <select id="estado" th:field="*{estado}" class="form-control">
                        <option value="1">Activo</option>
                        <option value="0">Inactivo</option>
                    </select>
                </div>

                <div class="form-actions">
                    <a th:href="@{/usuarios}" class="btn btn-secondary">Cancelar</a>
                    <button type="submit" class="btn btn-save">Guardar Usuario</button>
                </div>
            </form>
        </div>
    </div>
</main>

</body>
</html>
