<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KinalApp - Crear Cuenta</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a1a2e;
            margin: 0;
        }
        .register-card {
            background: #16213e;
            border-radius: 12px;
            padding: 2.5rem;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        .register-card h2 {
            color: #e94560;
            text-align: center;
            margin-bottom: 0.3rem;
            font-size: 1.6rem;
        }
        .register-card p.subtitle {
            color: #aaa;
            text-align: center;
            margin-bottom: 1.8rem;
            font-size: 0.85rem;
        }
        .form-group { margin-bottom: 1.1rem; }
        .form-group label {
            display: block;
            color: #ccc;
            margin-bottom: 0.35rem;
            font-size: 0.88rem;
        }
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 0.7rem 1rem;
            border-radius: 8px;
            border: 1px solid #0f3460;
            background: #0f3460;
            color: #fff;
            font-size: 0.95rem;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #e94560;
        }
        .form-group select option {
            background: #0f3460;
            color: #fff;
        }
        .form-group small {
            color: #666;
            font-size: 0.78rem;
        }
        .btn-register {
            width: 100%;
            padding: 0.85rem;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 0.5rem;
        }
        .btn-register:hover { background: #c73652; }
        .alert {
            padding: 0.75rem 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: 0.88rem;
        }
        .alert-danger {
            background: rgba(233,69,96,0.15);
            color: #e94560;
            border: 1px solid rgba(233,69,96,0.4);
        }
        .logo { text-align: center; font-size: 2.5rem; margin-bottom: 0.4rem; }
        .divider {
            text-align: center;
            color: #555;
            margin: 1.2rem 0 0.5rem;
            font-size: 0.85rem;
        }
        .link-login {
            display: block;
            text-align: center;
            color: #e94560;
            text-decoration: none;
            font-size: 0.9rem;
            padding: 0.5rem;
            border-radius: 8px;
            border: 1px solid #e94560;
            transition: background 0.2s;
        }
        .link-login:hover { background: rgba(233,69,96,0.1); }
    </style>
</head>
<body>
<div class="register-card">
    <div class="logo">📝</div>
    <h2>Crear Cuenta</h2>
    <p class="subtitle">Completa el formulario para registrarte</p>

    <!-- Mensaje de error -->
    <div th:if="${error}" class="alert alert-danger">
        ❌ <span th:text="${error}">Error</span>
    </div>

    <form th:action="@{/registro}" th:object="${usuario}" method="post">

        <div class="form-group">
            <label>🔑 Código de Usuario</label>
            <input type="text" th:field="*{codigoUsuario}"
                   placeholder="Ej: USR-001"
                   maxlength="20" required autofocus>
            <small>Identificador único, no se puede cambiar después</small>
        </div>

        <div class="form-group">
            <label>👤 Nombre de Usuario</label>
            <input type="text" th:field="*{username}"
                   placeholder="Ej: jperez"
                   maxlength="50" required>
        </div>

        <div class="form-group">
            <label>📧 Correo Electrónico</label>
            <input type="email" th:field="*{email}"
                   placeholder="Ej: juan@kinal.edu.gt"
                   maxlength="100">
        </div>

        <div class="form-group">
            <label>🔒 Contraseña</label>
            <input type="password" th:field="*{password}"
                   placeholder="Mínimo 6 caracteres"
                   minlength="6" required>
        </div>

        <div class="form-group">
            <label>🔒 Confirmar Contraseña</label>
            <input type="password" id="confirmPass"
                   placeholder="Repite tu contraseña"
                   minlength="6" required>
        </div>

        <div class="form-group">
            <label>🎭 Rol</label>
            <select th:field="*{rol}" required>
                <option value="">-- Seleccionar Rol --</option>
                <option value="ADMIN">🔐 Administrador</option>
                <option value="USUARIO">👤 Usuario</option>
            </select>
        </div>

        <button type="submit" class="btn-register">✅ Crear Cuenta</button>
    </form>

    <div class="divider">¿Ya tienes cuenta?</div>
    <a th:href="@{/login}" class="link-login">← Iniciar Sesión</a>
</div>

<script>
    document.querySelector('form').addEventListener('submit', function(e) {
        const pass = document.querySelector('input[name="password"]').value;
        const confirm = document.getElementById('confirmPass').value;
        if (pass !== confirm) {
            e.preventDefault();
            alert('❌ Las contraseñas no coinciden.');
        }
    });
</script>
</body>
</html>
